name: Luster Job Digest

on:
  schedule:
    - cron: '0 7 */2 * *'   # Ore — every 2 days at 7am UTC
    - cron: '0 7 * * 1'     # Efe — every Monday at 7am UTC
  workflow_dispatch:          # Manual trigger for both

jobs:
  digest-efe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests python-dotenv anthropic
      - name: Run Efe's digest
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          PERSONAL_EMAIL: ${{ secrets.PERSONAL_EMAIL }}
          PERSONAL_EMAIL_PASSWORD: ${{ secrets.PERSONAL_EMAIL_PASSWORD }}
        run: python search.py --config config_efe.json

  digest-ore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests python-dotenv anthropic
      - name: Run Ore's digest
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          WIFE_EMAIL: ${{ secrets.WIFE_EMAIL }}
          WIFE_EMAIL_PASSWORD: ${{ secrets.WIFE_EMAIL_PASSWORD }}
        run: python search.py --config config_ore.json